<svg viewBox="0 0 1100 380" xmlns="http://www.w3.org/2000/svg" style="background:#060b18;">
  <defs>
    <marker id="arh" markerWidth="7" markerHeight="7" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7" fill="none" stroke="#7889a8" stroke-width="1.5"/></marker>
    <marker id="arh-g" markerWidth="7" markerHeight="7" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7" fill="none" stroke="#ffd700" stroke-width="1.5"/></marker>
    <filter id="gl"><feGaussianBlur stdDeviation="2" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      text { font-family: 'Fira Code', 'SF Mono', Consolas, monospace; }
      .label-text { font-family: -apple-system, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- SECTION LABELS -->
  <text x="150" y="22" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600" letter-spacing="1.5" opacity="0.7">SHADOWTRAFFIC</text>
  <text x="365" y="22" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="600" letter-spacing="1.5" opacity="0.7">LANDING ZONE</text>
  <text x="620" y="22" text-anchor="middle" fill="#ffd700" font-size="9" font-weight="600" letter-spacing="1.5" opacity="0.7">PSP ENTITY GENERATORS</text>
  <text x="960" y="22" text-anchor="middle" fill="#ffd700" font-size="9" font-weight="600" letter-spacing="1.5" opacity="0.7">DATABRICKS LAKEFLOW (DLT)</text>

  <!-- COL 1: SHADOWTRAFFIC -->
  <rect x="60" y="120" width="180" height="120" rx="12" fill="#0c1225" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="150" y="153" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">SHADOWTRAFFIC</text>
  <text x="150" y="173" text-anchor="middle" fill="#7889a8" font-size="10" class="label-text">7 Entity Types</text>
  <text x="150" y="188" text-anchor="middle" fill="#7889a8" font-size="10" class="label-text">State Machines + FK Integrity</text>
  <text x="150" y="210" text-anchor="middle" fill="#a78bfa" font-size="9" opacity="0.5">Docker / JSONL Output</text>
  <text x="150" y="228" text-anchor="middle" fill="#a78bfa" font-size="9" opacity="0.5">~120,900 Records</text>

  <!-- Arrow 1 -->
  <line x1="244" y1="180" x2="274" y2="180" stroke="#7889a8" stroke-width="1.5" marker-end="url(#arh)"/>

  <!-- COL 2: LANDING ZONE -->
  <rect x="278" y="125" width="170" height="110" rx="12" fill="#0c1225" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="363" y="155" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">LANDING ZONE</text>
  <text x="363" y="175" text-anchor="middle" fill="#7889a8" font-size="10" class="label-text">/vol-landing-zone/{entity}/</text>
  <text x="363" y="190" text-anchor="middle" fill="#7889a8" font-size="10" class="label-text">Azure Blob Storage</text>
  <text x="363" y="220" text-anchor="middle" fill="#60a5fa" font-size="9" opacity="0.5">Unity Catalog Volume</text>

  <!-- Arrow 2 -->
  <line x1="452" y1="180" x2="482" y2="180" stroke="#7889a8" stroke-width="1.5" marker-end="url(#arh)"/>

  <!-- COL 3: ENTITY GENERATORS GROUP -->
  <rect x="486" y="32" width="270" height="316" rx="14" fill="rgba(12,18,37,0.8)" stroke="rgba(255,215,0,0.15)" stroke-width="1.5"/>

  <!-- merchants -->
  <rect x="498" y="44" width="246" height="34" rx="9" fill="#0c1225" stroke="#ffd700" stroke-width="1.5" filter="url(#gl)"/>
  <text x="516" y="65" fill="#ffd700" font-size="11" font-weight="700">merchants</text>
  <text x="600" y="65" fill="#7889a8" font-size="10" class="label-text">MCC, KYB, risk levels</text>
  <text x="732" y="70" text-anchor="end" fill="#ffd700" font-size="8" opacity="0.5">19.7K</text>

  <!-- customers -->
  <rect x="498" y="86" width="246" height="34" rx="9" fill="#0c1225" stroke="#ffd700" stroke-width="1.5" filter="url(#gl)"/>
  <text x="516" y="107" fill="#ffd700" font-size="11" font-weight="700">customers</text>
  <text x="604" y="107" fill="#7889a8" font-size="10" class="label-text">Hashed PII, segments</text>
  <text x="732" y="112" text-anchor="end" fill="#ffd700" font-size="8" opacity="0.5">24K</text>

  <!-- payments -->
  <rect x="498" y="128" width="246" height="34" rx="9" fill="#0c1225" stroke="#ffd700" stroke-width="1.5" filter="url(#gl)"/>
  <text x="516" y="149" fill="#ffd700" font-size="11" font-weight="700">payments</text>
  <text x="598" y="149" fill="#7889a8" font-size="10" class="label-text">Cards, wallets, BINs</text>
  <text x="732" y="154" text-anchor="end" fill="#ffd700" font-size="8" opacity="0.5">17.4K</text>

  <!-- orders -->
  <rect x="498" y="170" width="246" height="34" rx="9" fill="#0c1225" stroke="#ffd700" stroke-width="1.5" filter="url(#gl)"/>
  <text x="516" y="191" fill="#ffd700" font-size="11" font-weight="700">orders</text>
  <text x="580" y="191" fill="#7889a8" font-size="10" class="label-text">Amounts, channels</text>
  <text x="732" y="196" text-anchor="end" fill="#ffd700" font-size="8" opacity="0.5">16.1K</text>

  <!-- transactions -->
  <rect x="498" y="212" width="246" height="34" rx="9" fill="#0c1225" stroke="#ffd700" stroke-width="1.5" filter="url(#gl)"/>
  <text x="516" y="233" fill="#ffd700" font-size="11" font-weight="700">transactions</text>
  <text x="624" y="233" fill="#7889a8" font-size="10" class="label-text">State machine, 3DS</text>
  <text x="732" y="238" text-anchor="end" fill="#ffd700" font-size="8" opacity="0.5">11.2K</text>

  <!-- payouts -->
  <rect x="498" y="254" width="246" height="34" rx="9" fill="#0c1225" stroke="#ffd700" stroke-width="1.5" filter="url(#gl)"/>
  <text x="516" y="275" fill="#ffd700" font-size="11" font-weight="700">payouts</text>
  <text x="590" y="275" fill="#7889a8" font-size="10" class="label-text">Settlement, fees/net</text>
  <text x="732" y="280" text-anchor="end" fill="#ffd700" font-size="8" opacity="0.5">15.3K</text>

  <!-- disputes -->
  <rect x="498" y="296" width="246" height="34" rx="9" fill="#0c1225" stroke="#cd7f32" stroke-width="1.5" filter="url(#gl)"/>
  <text x="516" y="317" fill="#cd7f32" font-size="11" font-weight="700">disputes</text>
  <text x="598" y="317" fill="#7889a8" font-size="10" class="label-text">Chargebacks, SLA</text>
  <text x="732" y="322" text-anchor="end" fill="#cd7f32" font-size="8" opacity="0.5">17.2K</text>

  <!-- Arrow 3: entities -> Lakeflow -->
  <line x1="760" y1="180" x2="800" y2="180" stroke="#ffd700" stroke-width="2" marker-end="url(#arh-g)"/>

  <!-- COL 4: DATABRICKS LAKEFLOW (DLT) -->
  <!-- Bronze -->
  <rect x="818" y="55" width="220" height="80" rx="12" fill="#0c1225" stroke="#cd7f32" stroke-width="1.5"/>
  <circle cx="838" cy="83" r="14" fill="none" stroke="#cd7f32" stroke-width="2"/>
  <text x="838" y="88" text-anchor="middle" fill="#cd7f32" font-size="12" font-weight="700">B</text>
  <text x="868" y="81" fill="#cd7f32" font-size="14" font-weight="700">Bronze</text>
  <text x="868" y="100" fill="#7889a8" font-size="10" class="label-text">7 streaming tables</text>
  <text x="1020" y="81" text-anchor="end" fill="#cd7f32" font-size="9" opacity="0.5">Auto Loader</text>
  <text x="1020" y="97" text-anchor="end" fill="#cd7f32" font-size="9" opacity="0.5">read_files()</text>

  <!-- Arrow down Bronze -> Silver -->
  <line x1="928" y1="139" x2="928" y2="157" stroke="#ffd700" stroke-width="2" marker-end="url(#arh-g)"/>

  <!-- Silver -->
  <rect x="818" y="165" width="220" height="80" rx="12" fill="#0c1225" stroke="#c0c0c0" stroke-width="1.5"/>
  <circle cx="838" cy="193" r="14" fill="none" stroke="#c0c0c0" stroke-width="2"/>
  <text x="838" y="198" text-anchor="middle" fill="#c0c0c0" font-size="12" font-weight="700">S</text>
  <text x="868" y="191" fill="#c0c0c0" font-size="14" font-weight="700">Silver</text>
  <text x="868" y="210" fill="#7889a8" font-size="10" class="label-text">8 quality tables + DECIMAL</text>
  <text x="1020" y="191" text-anchor="end" fill="#4ade80" font-size="9" opacity="0.7">55+ rules</text>
  <text x="1020" y="207" text-anchor="end" fill="#4ade80" font-size="9" opacity="0.7">DROP ROW</text>

  <!-- Arrow down Silver -> Gold -->
  <line x1="928" y1="249" x2="928" y2="267" stroke="#ffd700" stroke-width="2" marker-end="url(#arh-g)"/>

  <!-- Gold -->
  <rect x="818" y="275" width="220" height="80" rx="12" fill="#0c1225" stroke="#ffd700" stroke-width="1.5"/>
  <circle cx="838" cy="303" r="14" fill="none" stroke="#ffd700" stroke-width="2"/>
  <text x="838" y="308" text-anchor="middle" fill="#ffd700" font-size="12" font-weight="700">G</text>
  <text x="868" y="301" fill="#ffd700" font-size="14" font-weight="700">Gold</text>
  <text x="868" y="320" fill="#7889a8" font-size="10" class="label-text">3 materialized views</text>
  <text x="1020" y="301" text-anchor="end" fill="#ffd700" font-size="9" opacity="0.5">Scoring</text>
  <text x="1020" y="317" text-anchor="end" fill="#ffd700" font-size="9" opacity="0.5">Analytics</text>

  <!-- Bottom summary bar -->
  <rect x="818" y="364" width="220" height="0" rx="0" fill="none"/>
  <text x="928" y="372" text-anchor="middle" fill="#ffd700" font-size="9" opacity="0.4">120K+ rows E2E verified</text>
</svg>
