# =============================================================================
# PSP Analytics Orchestration Job - Daily Refresh
# =============================================================================
#
# Single pipeline task triggering the unified analytics pipeline.
# Schedule: 6 AM UTC daily, paused by default for safe deployment.
#
# =============================================================================

resources:
  jobs:
    psp_analytics_refresh:
      name: "psp-analytics-refresh-${bundle.target}"
      tags:
        project: "psp-payment-system"
        team: "data-engineering"
        cost_center: "payments-analytics"

      # -----------------------------------------------------------------------
      # Schedule: Daily at 06:00 UTC, paused by default
      # -----------------------------------------------------------------------
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "UTC"
        pause_status: PAUSED

      # -----------------------------------------------------------------------
      # Job-level notifications
      # -----------------------------------------------------------------------
      email_notifications:
        on_failure:
          - "psp-data-team@company.com"

      # -----------------------------------------------------------------------
      # Task: Refresh the unified analytics pipeline
      # -----------------------------------------------------------------------
      tasks:
        - task_key: refresh_pipeline
          pipeline_task:
            pipeline_id: "${resources.pipelines.psp_analytics_pipeline.id}"
            full_refresh: false
