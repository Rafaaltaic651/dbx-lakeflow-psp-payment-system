# =============================================================================
# PSP Payment System - Lakeflow Declarative Pipelines
# Databricks Asset Bundles (DABs) Main Configuration
# =============================================================================
#
# Architecture: Medallion (Bronze -> Silver -> Gold)
# Entities:     Merchants, Customers, Payments, Orders, Transactions,
#               Payouts, Disputes
# Pipeline:     1 unified pipeline covering all entities and layers
# Orchestration: 1 daily job with pipeline refresh
#
# Deploy:
#   databricks bundle validate --target dev
#   databricks bundle deploy --target dev
#   databricks bundle run psp_analytics_pipeline --target dev
#
# =============================================================================

bundle:
  name: psp-payment-system-lakeflow
  databricks_cli_version: ">=0.283.0"

# ---------------------------------------------------------------------------
# Variables: Parameterized across all environments
# ---------------------------------------------------------------------------
variables:
  catalog:
    description: "Unity Catalog name for this environment"
    default: "psp"
  landing_volume:
    description: "Unity Catalog Volume path for raw data landing zone"
    default: "/Volumes/psp/analytics/vol-landing-zone"

# ---------------------------------------------------------------------------
# Include: Resource definitions split by concern
# ---------------------------------------------------------------------------
include:
  - resources/*.yml

# ---------------------------------------------------------------------------
# Targets: Environment-specific overrides
# ---------------------------------------------------------------------------
targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: "psp"
      landing_volume: "/Volumes/psp/analytics/vol-landing-zone"
    workspace:
      host: "https://adb-2090585310411504.4.azuredatabricks.net"

  prd:
    mode: production
    variables:
      catalog: "psp_prd"
      landing_volume: "/Volumes/psp_prd/analytics/vol-landing-zone"
    workspace:
      host: "https://adb-2090585310411504.4.azuredatabricks.net"
      root_path: "/Shared/.bundle/${bundle.name}/${bundle.target}"
    run_as:
      service_principal_name: psp-service-principal
    permissions:
      - level: CAN_VIEW
        group_name: psp-data-consumers
      - level: CAN_RUN
        group_name: psp-data-engineers
      - level: CAN_MANAGE
        service_principal_name: psp-service-principal
